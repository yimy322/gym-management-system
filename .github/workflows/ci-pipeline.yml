name: CI Pipeline - Gym Management System

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: 1. Descargar Codigo Fuente
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 3. Compilacion y Pruebas Unitarias (JaCoCo Coverage)
        run: mvn clean verify

      - name: 4. Analisis de Calidad de Codigo (SonarCloud)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=yimy322_gym-management-system \
            -Dsonar.organization=yimy322 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: 5. Analisis de Seguridad de Dependencias (Snyk SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test || true 
        #el test escanea el pom
        #el true significa que si hay vulnerabilidades rompera el ci

      - name: 6. Empaquetado - Construir Imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gym-app:latest .

      - name: 7. Escaneo de Vulnerabilidades de Sistema Operativo (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/gym-app:latest'
          format: 'table'
          exit-code: '0' #no rompera el ci
          severity: 'HIGH,CRITICAL'
        
      - name: 8. Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 9. Despliegue - Subir contenedor a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gym-app:latest 

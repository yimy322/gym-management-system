<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Miembros</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <!-- main content -->
    <div class="container-fluid px-4 py-4" style="background-color: #F5F6F8; min-height: 100vh;">

        <!-- title -->
        <h5 class="fw-bold text-uppercase mb-4">
            <i class="fa-solid fa-user-plus" style="color: #c9a227;"></i>
            Registro de afiliados
        </h5>

        <div class="card p-4">

            <small class="text-uppercase fw-bold text-muted" style="font-size: 10px;">
                Nuevo afiliado
            </small>
            <hr>

            <div class="row">
                <div class="col-12 col-md-4">
                    <label class="form-label">DNI</label>
                    <input type="text" class="form-control" placeholder="77777777" maxlength="8">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">NOMRES</label>
                    <input type="text" class="form-control" placeholder="Nombres">
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label">APELLIDOS</label>
                    <input type="text" class="form-control" placeholder="Apellidos">
                </div>
            </div>


            <div class="row mt-3">
                <div class="col-12 col-md-4">
                    <label class="form-label">TELEFONO</label>
                    <input type="tel" class="form-control" placeholder="999999999">
                </div>

                <div class="col-12 col-md-8">
                    <label class="form-label">EMAIL</label>
                    <input type="email" class="form-control" placeholder="email@ejemplo.com">
                </div>
            </div>



            <div class="mt-4">
                <button class="btn text-white d-flex aling-items-center gap-2" style="background-color: #111;">
                    <i class="fa-solid fa-user-check"></i>
                    Crear afiliado
                </button>
            </div>
        </div>

        <!-- tabla afiliados -->
        <div class="card p-4 mt-4">
            <h6>
                <i class="fa-solid fa-list" style="color: #c9a227;"></i>
                   Lista de afiliados
            </h6>
            <table>
                <thead class="text-uppercase text-muted" style="font-size: 11px;">
                    <tr>
                        <th>DNI</th>
                        <th>NONBRE</th>
                        <th>APELLIDOS</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="afiliado : ${afiliados}">
                        <td th:text="${afiliado.dni}"></td>
                        <td th:text="${afiliado.nombres}"></td>
                        <td th:text="${afiliado.apellidos}"></td>
                        <td>
                            <span class="badge rounded-pill px-3 py-2"
                                style="background-color: #d1f5e0; color: #1a7a4a; font-size: 11px;">
                                ACTIVO
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm border-0 p-1" style="color: #5b8dee;">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn btn-sm border-0 p-1" style="color: #e74c3c;">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
                </tbody>
            </table>
        </div>
        <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>

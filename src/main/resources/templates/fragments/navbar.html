<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <title>navbar</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>

    <link rel="stylesheet" th:href="@{/css/styles.css}"/>

<body>

    <nav class="navbar navbar-expand-lg bg-white  px-4" th:fragment="navbar">

        </a>
        
        <!--- links de navegación -->
        
        <div class="d-flex w-100 align-items-center">
            <ul class="navbar-nav me-auto gap-1">

                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>

                </li>
            </ul>

            <div class="d-flex align-items-center gap-2">

                <div class="circulo-usuario">A</div>

                <span style="font-size:13px; font-weight: 600;">admin</span>

                 <a th:href="@{/logout}" class="btn btn-sm btn-outline-secondary rounded-circle p-1" style="width:32px; height:32px;">

        </div>
    </nav>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresías</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

      <!-- main content -->
    <div class="container-fluid px-4 py-4" style="background-color: #F5F6F8; min-height: 100vh;">

        <!-- title -->
        <h5 class="fw-bold text-uppercase mb-4">
            <i class="fa-solid fa-file-invoice me-2" style="color: #c9a227;"></i>
            Asignar Membresías
        </h5>

        <!-- center card -->
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="bg-white rounded p-4">

                    <!-- search dni -->
                    <small class="text-uppercase fw-semibold text-muted" style="font-size: 10px;">DNI del Afiliado</small>
                    <div class="input-group mt-2 mb-3">
                        <span class="input-group-text bg-white">
                            <i class="fa-solid fa-id-card text-muted"></i>
                        </span>
                        <input type="text" class="form-control" placeholder="70000025" maxlength="8">
                        <button class="btn text-white fw-bold px-4" style="background-color: #111;">
                            <i class="fa-solid fa-magnifying-glass me-1"></i>
                            Buscar
                        </button>
                    </div>

                    <!-- member info -->
                    <div class="d-flex align-items-center justify-content-between bg-light rounded p-3 mb-3">
                        <div class="d-flex align-items-center gap-3">
                            <div class="d-flex justify-content-center align-items-center rounded-circle"
                                 style="width:40px; height:40px; background-color: #e0e0e0;">
                                <i class="fa-solid fa-user text-muted"></i>
                            </div>
                            <div>
                                <div class="fw-bold" style="font-size: 14px;">Victor Acuña Medina</div>
                                <small class="text-muted">DNI: 70000025</small>
                            </div>
                        </div>
                        <span class="badge rounded-pill" style="background-color: #d4f5e9; color: #28a745;">ACTIVO</span>
                    </div>

                    <!-- active membership alert -->
                    <div class="rounded p-3 mb-3 d-flex align-items-center gap-2" style="background-color: #d4f5e9;">
                        <i class="fa-solid fa-circle-check" style="color: #28a745;"></i>
                        <small style="color: #28a745;">Afiliado con membresía activa</small>
                    </div>

                    <!-- membership detail -->
                    <div class="border rounded p-3 mb-4">
                        <h6 class="fw-bold text-uppercase mb-3">Victor Acuña Medina</h6>
                        <div class="row" style="font-size: 12px;">
                            <div class="col">
                                <small class="text-uppercase text-muted fw-semibold">Inicio</small>
                                <div>2025-12-03</div>
                            </div>
                            <div class="col">
                                <small class="text-uppercase text-muted fw-semibold">Fin</small>
                                <div>2026-12-04</div>
                            </div>
                            <div class="col">
                                <small class="text-uppercase text-muted fw-semibold">Estado</small>
                                <div><span class="badge rounded-pill" style="background-color: #d4f5e9; color: #28a745;">ACTIVA</span></div>
                            </div>
                            <div class="col">
                                <small class="text-uppercase text-muted fw-semibold">Precio</small>
                                <div class="fw-bold" style="color: #28a745;">S/ 700.00</div>
                            </div>
                            <div class="col">
                                <small class="text-uppercase text-muted fw-semibold">Registro</small>
                                <div>2025-12-03</div>
                            </div>
                        </div>
                    </div>

                    <small class="text-uppercase fw-semibold text-muted" style="font-size: 10px;">Seleccionar Membresía</small>
                    <div class="input-group mt-2 mb-4">
                        <span class="input-group-text bg-white">
                            <i class="fa-solid fa-id-card text-muted"></i>
                        </span>
                        <select class="form-select">
                            <option>— Seleccione una membresía —</option>
                        </select>
                    </div>

                    <button class="btn text-white fw-bold text-uppercase py-3 px-4" style="background-color: #111; letter-spacing: 0.05em;">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        Asignar Membresía
                    </button>

                </div>
            </div>
        </div>

    </div>

    <script th:src="@{/js/bootstrap.min.js}"></script>
</body>
</html>

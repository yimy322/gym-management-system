<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <!-- contenido principal -->
     <div class="container-fluid px-4 py-4" style="background-color: #F5F6F8; min-height: 100vh;">
        <!-- titulo -->
         <h5 class="fw-bold text-uppercase mb-4">
            <i class="fa-solid fa-chart-bar me-2" style="color: #c9a227;"></i>
            Dashboard General
        </h5>
        <!-- 4 tarjetas -->
         <div class="row g-3 mb-4">
            <!-- ingresos totales -->
             <div class="col-md-3">
                <div class="bg-white rounded p-3 h-100" style="border-top: 3px solid #28a745;">
                    <small class="text-uppercase text-muted fw-semibold" style="font-size: 10px;">Ingresos Totales</small>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <h4 class="fw-bold mb-0">S/10,580</h4>
                        <i class="fa-regular fa-money-bill-1 fa-xl text-muted"></i>
                    </div>
                </div>
            </div>
            
            <!-- afiliados activos -->
            <div class="col-md-3">
                <div class="bg-white rounded p-3 h-100" style="border-top: 3px solid #c9a227;">
                    <small class="text-uppercase text-muted fw-semibold" style="font-size: 10px;">Afiliados Activos</small>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <h4 class="fw-bold mb-0">30</h4>
                        <i class="fa-solid fa-users fa-xl text-muted"></i>
                    </div>
                </div>
            </div>

            <!-- afiliaciones vencidas -->
            <div class="col-md-3">
                <div class="bg-white rounded p-3 h-100" style="border-top: 3px solid #dc3545;">
                    <small class="text-uppercase text-muted fw-semibold" style="font-size: 10px;">Afiliaciones Vencidas</small>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <h4 class="fw-bold mb-0">0</h4>
                        <i class="fa-regular fa-circle-xmark fa-xl text-muted"></i>
                    </div>
                </div>
            </div>

            <!-- prom. asistencia diaria -->
            <div class="col-md-3">
                <div class="bg-white rounded p-3 h-100" style="border-top: 3px solid #0d6efd;">
                    <small class="text-uppercase text-muted fw-semibold" style="font-size: 10px;">Prom. Asistencia Diaria</small>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <h4 class="fw-bold mb-0">3.65</h4>
                        <i class="fa-solid fa-chart-line fa-xl text-muted"></i>
                    </div>
                </div>
            </div>

        </div>
        <!-- acciones rapidas y estado del sistema -->
         <div class="row g-3">
            <!-- acciones rapidas -->
             <div class="col-md-6">
                <div class="bg-white rounded p-4 h-100">
                    <small class="text-uppercase fw-bold text-muted" style="font-size: 10px;">
                        <i class="fa-solid fa-bolt me-1" style="color: #c9a227;"></i>
                        Acciones Rápidas
                    </small>
                    <hr>
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/registrar}" class="btn btn-outline-secondary btn-sm">
                            <i class="fa-solid fa-user-plus me-1" style="color: #c9a227;"></i>
                            Registrar Afiliado
                        </a>
                        <a th:href="@{/attendance}" class="btn btn-outline-secondary btn-sm">
                            <i class="fa-solid fa-calendar-check me-1" style="color: #c9a227;"></i>
                            Registrar Asistencia
                        </a>
                        <a th:href="@{/memberships}" class="btn btn-outline-secondary btn-sm">
                            <i class="fa-solid fa-id-card me-1" style="color: #c9a227;"></i>
                            Ver Membresías
                        </a>
                    </div>
                </div>
            </div>
            <!-- estado del sistema -->
             <div class="col-md-6">
                <div class="bg-white rounded p-4 h-100">
                    <small class="text-uppercase fw-bold text-muted" style="font-size: 10px;">
                        <i class="fa-solid fa-heart-pulse me-1" style="color: #dc3545;"></i>
                        Estado del Sistema
                    </small>
                    <hr>
                    <ul class="list-unstyled mt-3">
                        <li class="mb-3">
                            <i class="fa-solid fa-circle me-2" style="color: #28a745; font-size: 10px;"></i>
                            Sistema operativo
                        </li>
                        <hr class="my-1">
                        <li class="mb-3 mt-3">
                            <i class="fa-solid fa-circle me-2" style="color: #28a745; font-size: 10px;"></i>
                            Base de datos conectada
                        </li>
                        <hr class="my-1">
                        <li class="mt-3">
                            <i class="fa-solid fa-circle me-2" style="color: #28a745; font-size: 10px;"></i>
                            Asistencias activas
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>  
</body>
</html>
